version: '3.9'
services:
  ticket-alert-system:
    build: .
    ports:
      - "3210:3210"
    environment:
      PORT: 3210
      HOST: 0.0.0.0
      REMINDER_INTERVAL_MS: 600000
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMS_ENABLED: ${SMS_ENABLED:-false}
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    restart: unless-stopped
